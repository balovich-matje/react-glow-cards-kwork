<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Cards — Glassmorphism Demo</title>

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #030810;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Space background image ───────────────────── */
    .space-bg {
      position: fixed;
      inset: 0;
      background: url('space-bg.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* Subtle vignette overlay for depth */
    .space-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 80% 70% at 35% 55%,
        transparent 30%,
        rgba(3, 8, 16, .3) 70%,
        rgba(3, 8, 16, .6) 100%
      );
    }

    /* ── Layout ───────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 100vh;
      padding: 40px 8vw 40px 40px;
    }

    .cards-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Account Card ────────────────────────────── */
    .account-card {
      position: relative;
      width: 480px;
      padding: 28px 32px 24px;
      border-radius: 16px;
      background:
        linear-gradient(
          180deg,
          rgba(10, 15, 30, .75) 0%,
          rgba(8, 12, 25, .60) 100%
        ),
        url('card-bg.jpg') center center / cover no-repeat;
      border: 1px solid rgba(255, 255, 255, .10);
      cursor: default;
      overflow: hidden;
      transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      /* Glow — soft diffused border light matching mockup */
      box-shadow:
        0 0 18px 2px rgba(140, 180, 220, .08),
        0 0 50px 8px rgba(100, 150, 200, .05),
        0 8px 32px rgba(0, 0, 0, .4);
    }

    .account-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, .18);
      box-shadow:
        0 0 25px  5px rgba(140, 190, 230, .14),
        0 0 60px 15px rgba(110, 160, 210, .08),
        0 0 100px 25px rgba(80, 130, 190, .04),
        0 12px 40px rgba(0, 0, 0, .45);
    }

    /* Glow pseudo-element — wide soft halo behind card */
    .account-card::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 30px;
      background: radial-gradient(
        ellipse at center,
        rgba(120, 170, 220, .06) 0%,
        transparent 70%
      );
      z-index: -1;
      opacity: 0;
      transition: opacity .35s ease;
      pointer-events: none;
    }

    .account-card:hover::after {
      opacity: 1;
    }

    /* Card inner elements */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, .45);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, .6);
      margin-bottom: 6px;
    }

    .card-balance {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      color: rgba(255, 255, 255, .92);
    }

    .card-currency {
      font-size: 12px;
      color: rgba(255, 255, 255, .3);
      font-weight: 500;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .card-number {
      font-size: 13px;
      color: rgba(255, 255, 255, .28);
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(100, 220, 150, .7);
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(100, 220, 150, .7);
      box-shadow: 0 0 6px rgba(100, 220, 150, .3);
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 768px) {
      .app {
        justify-content: center;
        padding: 40px 20px;
      }
    }

    @media (max-width: 540px) {
      .account-card {
        width: calc(100vw - 40px);
        padding: 22px 20px 20px;
      }

      .card-balance {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="space-bg"></div>

  <div id="root"></div>

  <script type="text/babel">
    function AccountCard({ name, balance, currency, icon, accountNumber }) {
      return (
        <div className="account-card">
          <div className="card-header">
            <span className="card-type">Savings Account</span>
            <div className="card-icon">{icon}</div>
          </div>

          <div className="card-name">{name}</div>
          <div className="card-balance">
            {currency === 'USD' ? '$' : ''}
            {balance.toLocaleString('en-US', { minimumFractionDigits: 2 })}
          </div>
          <div className="card-currency">{currency}</div>

          <div className="card-footer">
            <span className="card-number">{accountNumber}</span>
            <span className="card-status">
              <span className="status-dot"></span>
              Active
            </span>
          </div>
        </div>
      );
    }

    function App() {
      const accounts = [
        {
          name: 'Main Account',
          balance: 24830.50,
          currency: 'USD',
          icon: '💎',
          accountNumber: '•••• 4521',
        },
        {
          name: 'Savings Goal',
          balance: 12460.00,
          currency: 'USD',
          icon: '✨',
          accountNumber: '•••• 8734',
        },
      ];

      return (
        <div className="app">
          <div className="cards-wrapper">
            {accounts.map((acc, i) => (
              <AccountCard key={i} {...acc} />
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
