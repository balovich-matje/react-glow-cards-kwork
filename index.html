<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Cards — Glassmorphism Demo</title>

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Starfield ────────────────────────────────── */
    .stars, .stars-2, .stars-3 {
      position: fixed;
      inset: 0;
      background: transparent;
      pointer-events: none;
    }

    .stars {
      background-image:
        radial-gradient(1px 1px at  50px 120px, #fff 100%, transparent),
        radial-gradient(1px 1px at 180px  30px, rgba(255,255,255,.8) 100%, transparent),
        radial-gradient(1px 1px at 320px 200px, #fff 100%, transparent),
        radial-gradient(1px 1px at 470px  80px, rgba(255,255,255,.6) 100%, transparent),
        radial-gradient(1px 1px at 620px 300px, #fff 100%, transparent),
        radial-gradient(1px 1px at 100px 400px, rgba(255,255,255,.7) 100%, transparent),
        radial-gradient(1px 1px at 750px 150px, #fff 100%, transparent),
        radial-gradient(1px 1px at 900px 350px, rgba(255,255,255,.5) 100%, transparent),
        radial-gradient(1.5px 1.5px at 200px 500px, #fff 100%, transparent),
        radial-gradient(1px 1px at 400px 450px, rgba(255,255,255,.9) 100%, transparent);
      background-size: 1000px 600px;
      animation: drift 60s linear infinite;
    }

    .stars-2 {
      background-image:
        radial-gradient(1.2px 1.2px at  80px  60px, rgba(255,255,255,.6) 100%, transparent),
        radial-gradient(1px   1px   at 260px 180px, rgba(255,255,255,.4) 100%, transparent),
        radial-gradient(1.5px 1.5px at 500px 100px, rgba(200,220,255,.7) 100%, transparent),
        radial-gradient(1px   1px   at 700px 280px, rgba(255,255,255,.5) 100%, transparent),
        radial-gradient(1px   1px   at 350px 380px, rgba(255,255,255,.3) 100%, transparent),
        radial-gradient(1.2px 1.2px at 150px 250px, rgba(200,210,255,.6) 100%, transparent),
        radial-gradient(1px   1px   at 850px  50px, rgba(255,255,255,.4) 100%, transparent),
        radial-gradient(1px   1px   at 600px 450px, rgba(255,255,255,.5) 100%, transparent);
      background-size: 900px 500px;
      animation: drift 90s linear infinite reverse;
    }

    .stars-3 {
      background-image:
        radial-gradient(2px 2px at 120px 220px, rgba(180,200,255,.9) 100%, transparent),
        radial-gradient(2px 2px at 550px 380px, rgba(255,255,255,.8) 100%, transparent),
        radial-gradient(1.5px 1.5px at 800px 120px, rgba(200,220,255,.7) 100%, transparent),
        radial-gradient(2px 2px at 300px  50px, rgba(255,255,255,.6) 100%, transparent),
        radial-gradient(1.5px 1.5px at 680px 500px, rgba(180,200,255,.5) 100%, transparent);
      background-size: 1100px 700px;
      animation: twinkle 4s ease-in-out infinite alternate, drift 120s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-600px); }
    }

    @keyframes twinkle {
      0%   { opacity: .4; }
      100% { opacity: 1; }
    }

    /* ── Planet (CSS only) ───────────────────────── */
    .planet {
      position: fixed;
      bottom: -320px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(
        circle at 35% 30%,
        #1a3a5c 0%,
        #0d1f3c 30%,
        #060e1f 60%,
        #020810 100%
      );
      box-shadow:
        0 0 80px 20px rgba(60, 140, 255, .12),
        0 0 160px 60px rgba(40, 100, 200, .06),
        inset 0 0 60px 10px rgba(0,0,0,.5);
      pointer-events: none;
      z-index: 0;
    }

    .planet::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: radial-gradient(
        circle at 30% 25%,
        rgba(80, 160, 255, .15) 0%,
        transparent 50%
      );
    }

    .planet::after {
      content: '';
      position: absolute;
      top: 10%;
      left: 5%;
      width: 90%;
      height: 80%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(30,80,140,.4) 0%, transparent 40%),
        radial-gradient(ellipse at 70% 30%, rgba(20,60,120,.3) 0%, transparent 35%),
        radial-gradient(ellipse at 50% 70%, rgba(40,100,160,.2) 0%, transparent 30%);
    }

    /* ── Layout ───────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px 120px;
      position: relative;
      z-index: 1;
    }

    .cards-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Account Card ────────────────────────────── */
    .account-card {
      position: relative;
      width: 380px;
      padding: 28px 28px 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, .15);
      cursor: default;
      transition: transform .3s ease, box-shadow .3s ease;
      /* Glow — multi-layer box-shadow */
      box-shadow:
        0 0 20px 2px rgba(120, 180, 255, .10),
        0 0 40px 4px rgba(100, 160, 255, .06),
        0 8px 32px rgba(0, 0, 0, .3);
    }

    .account-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 0 30px  6px rgba(120, 180, 255, .22),
        0 0 60px 12px rgba(100, 160, 255, .12),
        0 0 100px 20px rgba(80, 140, 255, .06),
        0 12px 40px rgba(0, 0, 0, .35);
    }

    /* Glow pseudo-element behind the card */
    .account-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 17px;
      background: linear-gradient(
        135deg,
        rgba(120, 180, 255, .15) 0%,
        rgba(100, 160, 255, .05) 50%,
        rgba(160, 200, 255, .10) 100%
      );
      z-index: -1;
      opacity: 0;
      transition: opacity .3s ease;
    }

    .account-card:hover::before {
      opacity: 1;
    }

    /* Card inner elements */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .card-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, .5);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(100, 160, 255, .25), rgba(140, 180, 255, .10));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .card-name {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, .75);
      margin-bottom: 6px;
    }

    .card-balance {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #fff 30%, rgba(160, 200, 255, .9));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-currency {
      font-size: 13px;
      color: rgba(255, 255, 255, .4);
      font-weight: 500;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .card-number {
      font-size: 13px;
      color: rgba(255, 255, 255, .35);
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(100, 220, 150, .8);
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(100, 220, 150, .8);
      box-shadow: 0 0 6px rgba(100, 220, 150, .4);
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 440px) {
      .account-card {
        width: calc(100vw - 40px);
        padding: 22px 20px 20px;
      }

      .card-balance {
        font-size: 26px;
      }

      .planet {
        width: 500px;
        height: 500px;
        bottom: -250px;
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars-2"></div>
  <div class="stars-3"></div>
  <div class="planet"></div>

  <div id="root"></div>

  <script type="text/babel">
    function AccountCard({ name, balance, currency, icon, accountNumber }) {
      return (
        <div className="account-card">
          <div className="card-header">
            <span className="card-type">Savings Account</span>
            <div className="card-icon">{icon}</div>
          </div>

          <div className="card-name">{name}</div>
          <div className="card-balance">
            {currency === 'USD' ? '$' : ''}
            {balance.toLocaleString('en-US', { minimumFractionDigits: 2 })}
          </div>
          <div className="card-currency">{currency}</div>

          <div className="card-footer">
            <span className="card-number">{accountNumber}</span>
            <span className="card-status">
              <span className="status-dot"></span>
              Active
            </span>
          </div>
        </div>
      );
    }

    function App() {
      const accounts = [
        {
          name: 'Main Account',
          balance: 24830.50,
          currency: 'USD',
          icon: '💎',
          accountNumber: '•••• 4521',
        },
        {
          name: 'Savings Goal',
          balance: 12460.00,
          currency: 'USD',
          icon: '✨',
          accountNumber: '•••• 8734',
        },
      ];

      return (
        <div className="app">
          <div className="cards-wrapper">
            {accounts.map((acc, i) => (
              <AccountCard key={i} {...acc} />
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
